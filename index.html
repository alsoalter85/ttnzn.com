<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ttnzn.com significa attenzione.">
    <meta name="theme-color" content="#fff7d1">
    <title>ttnzn - attenzione</title>
    <link rel="icon" href="assets/attento.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage">
      <header class="topbar" aria-label="ttnzn">
        <a class="wordmark" href="./" aria-label="ttnzn home">
          <img src="assets/attento.svg" alt="">
          <span>ttnzn</span>
        </a>
        <div class="status" aria-hidden="true">
          <span></span>
          <b>attenzione</b>
        </div>
      </header>

      <section class="mouth-zone" aria-label="Attenzione">
        <div class="poster-type" aria-hidden="true">
          <span>attento</span>
          <span>attento</span>
          <span>attento</span>
        </div>

        <button class="alien" type="button" aria-label="Fai dire attenzione" aria-pressed="false">
          <span class="wave wave-one"></span>
          <span class="wave wave-two"></span>
          <span class="head">
            <img class="attento-mark" src="assets/attento.svg" alt="">
            <span class="mouth">
              <span class="teeth teeth-top"></span>
              <span class="shout">attenzione</span>
              <span class="teeth teeth-bottom"></span>
            </span>
          </span>
        </button>

        <div class="copy">
          <p>ttnzn.com</p>
          <h1>attenzione</h1>
          <span id="live-shout" aria-live="polite"></span>
        </div>

        <div class="controls" aria-label="Comandi">
          <button class="action action-primary" id="shout-button" type="button">
            <span aria-hidden="true">!</span>
            attenzione
          </button>
          <button class="action action-quiet" id="quiet-button" type="button" aria-label="Chiudi la bocca">
            <span aria-hidden="true">x</span>
          </button>
        </div>
      </section>

      <footer class="ticker" aria-hidden="true">
        <span>ttnzn</span>
        <span>attenzione</span>
        <span>attento</span>
        <span>ttnzn</span>
        <span>attenzione</span>
        <span>attento</span>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
